name: Lint and Test Helm Charts

permissions:
  contents: read

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'charts/**'
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch: null

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Chart Testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Copy examples for ct in /charts/qubership-monitoring-operator/ci/
        run: |
            mkdir -p charts/qubership-grafana-operator-converter/ci
            ls -la charts charts/qubership-grafana-operator-converter charts/qubership-grafana-operator-converter/ci

      - name: Run chart-testing (lint)
        run: ct lint --check-version-increment=false --validate-maintainers=false --target-branch=main --chart-dirs=charts
